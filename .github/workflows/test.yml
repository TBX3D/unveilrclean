name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lune
        run: |
          curl -L "https://github.com/lune-org/lune/releases/download/v0.10.4/lune-0.10.4-linux-x86_64.zip" -o lune.zip
          unzip lune.zip
          chmod +x lune
          sudo mv lune /usr/local/bin/lune
          lune --version

      - name: Run tests
        run: lune run testing/run_tests.luau
